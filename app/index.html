<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Av/SocialOS — GlobalAir.com Social Operations Hub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23102297'/><text x='16' y='22' text-anchor='middle' font-size='14' fill='%2397cb00' font-weight='700'>Av</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <a href="#content-area" class="skip-link">Skip to main content</a>

  <!-- ============================================================
       SIDEBAR
       ============================================================ -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="avos avos-sm" style="justify-content:center">
        <span class="avos-av">Av</span>
        <span class="avos-slash">/</span>
        <span class="avos-core">Social</span>
        <span class="avos-os">OS</span>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Command</div>
      <div class="nav-item active" data-route="dashboard" onclick="Router.navigate('dashboard')" tabindex="0" role="link">
        <span class="nav-icon">&#128202;</span>
        <span class="nav-label">Dashboard</span>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Operations</div>
      <div class="nav-item" data-route="calendar" onclick="Router.navigate('calendar')" tabindex="0" role="link">
        <span class="nav-icon">&#128197;</span>
        <span class="nav-label">Content Calendar</span>
      </div>
      <div class="nav-item" data-route="tasks" onclick="Router.navigate('tasks')" tabindex="0" role="link">
        <span class="nav-icon">&#9989;</span>
        <span class="nav-label">Tasks & Pipeline</span>
      </div>
      <div class="nav-item" data-route="canva" onclick="Router.navigate('canva')" tabindex="0" role="link">
        <span class="nav-icon">&#127912;</span>
        <span class="nav-label">Canva & Assets</span>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Analytics</div>
      <div class="nav-item" data-route="performance" onclick="Router.navigate('performance')" tabindex="0" role="link">
        <span class="nav-icon">&#128200;</span>
        <span class="nav-label">Performance</span>
      </div>
      <div class="nav-item" data-route="competitor" onclick="Router.navigate('competitor')" tabindex="0" role="link">
        <span class="nav-icon">&#128373;</span>
        <span class="nav-label">Competitor Pulse</span>
      </div>
      <div class="nav-item" data-route="utm" onclick="Router.navigate('utm')" tabindex="0" role="link">
        <span class="nav-icon">&#128279;</span>
        <span class="nav-label">UTM Tracker</span>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Strategy</div>
      <div class="nav-item" data-route="channel" onclick="Router.navigate('channel')" tabindex="0" role="link">
        <span class="nav-icon">&#127760;</span>
        <span class="nav-label">Channel Strategy</span>
      </div>
      <div class="nav-item" data-route="authority" onclick="Router.navigate('authority')" tabindex="0" role="link">
        <span class="nav-icon">&#127942;</span>
        <span class="nav-label">Ian Authority</span>
      </div>
    </div>

    <div style="margin-top:auto; padding:16px 20px; font-size:10px; color:rgba(255,255,255,0.25);">
      GlobalAir.com &copy; 2026
    </div>
  </nav>

  <!-- ============================================================
       MAIN AREA
       ============================================================ -->
  <div id="main">

    <!-- Topbar -->
    <header id="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle navigation">&#9776;</button>
        <div id="topbar-date-range"></div>
      </div>
      <div class="topbar-right">
        <div id="topbar-team-avatars"></div>
        <div id="topbar-quick-links"></div>
      </div>
    </header>

    <!-- Content Area -->
    <main id="content-area">
      <div class="page-loading">
        <div class="skeleton-block"></div>
        <div class="skeleton-block"></div>
        <div class="skeleton-block"></div>
      </div>
    </main>

  </div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- ============================================================
       SCRIPTS — Order matters: dependencies first, pages last
       ============================================================ -->
  <script src="js/store.js"></script>
  <script src="js/events.js"></script>
  <script src="js/components.js"></script>
  <script src="js/windsor.js"></script>
  <script src="js/seed-data.js"></script>
  <script src="js/router.js"></script>

  <!-- Page Modules -->
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/calendar.js"></script>
  <script src="js/pages/tasks.js"></script>
  <script src="js/pages/performance.js"></script>
  <script src="js/pages/competitor.js"></script>
  <script src="js/pages/canva-assets.js"></script>
  <script src="js/pages/channel-strategy.js"></script>
  <script src="js/pages/utm-tracker.js"></script>
  <script src="js/pages/ian-authority.js"></script>

  <script>
    // ---- Boot ----
    (function boot() {
      SeedData.initialize();
      renderTopbar();
      Router.init();
    })();

    // Keyboard support: Enter on nav items
    document.querySelectorAll('.nav-item[data-route]').forEach(item => {
      item.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); item.click(); } });
    });

    function renderTopbar() {
      const settings = Store.get('social_settings') || {};
      document.getElementById('topbar-date-range').innerHTML = Components.dateRangePicker(settings.date_range || '30d');

      // Team avatars
      const team = SeedData.getTeam();
      document.getElementById('topbar-team-avatars').innerHTML = team.slice(0, 4).map(m =>
        `<span class="avatar" title="${m.name}" style="background:${m.color}">${m.initials}</span>`
      ).join('');

      // Quick links
      document.getElementById('topbar-quick-links').innerHTML = `
        <a href="https://app.sendible.com" target="_blank" class="topbar-link" title="Sendible">&#128228; Sendible</a>
        <a href="https://www.canva.com" target="_blank" class="topbar-link" title="Canva">&#127912; Canva</a>
      `;
    }
  </script>

</body>
</html>
